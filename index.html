<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Page</title>
    <link rel="stylesheet" href="static/css/index.css">
</head>
<body>
    <main class="container liquid">
        <div class="form-box">
            <h2>Create Account</h2>
            <form class="form-content" action="/register" method="POST">
                <label for="reg-name">Name</label>
                <input class="input-content" id="reg-name" type="text" placeholder="Your name" required>
                
                <label for="reg-email">Email</label>
                <input class="input-content" id="reg-email" type="email" placeholder="Email address" required>
                
                <label for="reg-password">Password</label>
                <div class="password-field">
                    <input class="input-content" id="reg-password" type="password" placeholder="Create password" required>
                    <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                
                <label for="reg-confirm">Confirm Password</label>
                <div class="password-field">
                    <input class="input-content" id="reg-confirm" type="password" placeholder="Repeat password" required>
                    <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="form-box">
            <h2>Welcome Back</h2>
            <form class="form-content" action="/login" method="POST">
                <label for="login-email">Email</label>
                <input class="input-content" id="login-email" type="email" placeholder="Enter email" required>
                
                <label for="login-password">Password</label>
                <div class="password-field">
                    <input class="input-content" id="login-password" type="password" placeholder="Enter password" required>
                    <button type="button" class="password-toggle" aria-label="Show password" aria-pressed="false">
                        <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <p class="form-auth-extra"><a href="forgot.html">Forgot password?</a></p>
                
                <button type="submit">Login</button>
            </form>
        </div>

        <div class="wall">
            <a id="have" onclick="right()">Have an account?</a>
            <a id="nohave" onclick="right()">No account?</a>
        </div>
    </main>
    <script src="static/js/index.js"></script>
</body>
</html>
